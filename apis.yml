aid: london-stock-exchange-group
name: London Stock Exchange Group
description: London Stock Exchange Group plc is a United Kingdom-based stock exchange and financial information company headquartered
  in the City of London, England. LSEG provides capital markets, data and analytics, risk management, and post-trade services
  including the World-Check screening platform for KYC and anti-money-laundering due diligence.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/icons/london-stock-exchange-group.png
