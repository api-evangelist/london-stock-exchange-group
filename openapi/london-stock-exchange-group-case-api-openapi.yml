      - Case
      summary: London Stock Exchange Group Search for Cases based on specified criteria using filter or query parameters.
      description: "Search for Cases based on specified criteria using filter or query parameters.\n\nThis endpoint allows you to find cases that match your search criteria. \nYou can provide these criteria through the [CaseSearchRequest](#CaseSearchRequest) object, which includes 'query' and 'filter' fields. \nExpressions in 'query' and 'filter' must adhere to the Atom Feed Item Query Language (FIQL), \nwhich is documented in [RFC 4288](https://tools.ietf.org/html/rfc4288) and the superset supported by the WC1 API, \nas documented in [WC1 API Query Language](https://github.com/jirutka/rsql-parser).\n\n**Note:** To learn about the available search fields and their usage, you can use the `GET /reference/searchFilters` endpoint.\n\nResponse details can be customized using the 'detailLevel' field:\n  - 'CASE': The search response will provide full Case details.\n  - 'CASE_AND_RESULTS': The search response will include Сase details and Result summary related to this Case.\n  - 'CASE_AND_AGGREGATED_RESULTS': The search response will provide full Case details with an aggregated Result summary, summarizing data from primary and sub-cases.\n  - 'CASE_AND_RESULTS_AND_AGGREGATED_RESULTS': The search response will provide full Case details with a Result and aggregated(summarizing data from primary and sub-cases) summaries.\n\nNumber of results can be controlled through 'pagination' and 'sort' fields.\n"
      parameters:
      - name: Authorization
        description: The authorization credentials including 'keyId', 'algorithm', 'headers', 'signature' (see 'Security and Authentication details' documentation section for more details).
        in: header
        type: string
        required: true
      - name: Date
        description: The date and time at which the message was originated in 'RFC 1123' format.
        in: header
        type: string
        required: true
      - name: Content-Type
        description: The media type of the request (e.g., 'application/json').
        in: header
        type: string
        required: true
      - name: Content-Length
        description: The length of the request body in octets (8-bit bytes).
        in: header
        type: integer
        required: true
      - name: caseSearchRequest
        description: The request containing search criteria.
        in: body
        required: true
        schema:
          $ref: '#/definitions/CaseSearchRequest'
      responses:
        200:
          description: A set of Cases that match the specified criteria.
          schema:
            $ref: '#/definitions/CaseSearchResponse'
        400:
          $ref: '#/responses/BadRequest'
        401:
          $ref: '#/responses/Unauthorized'
        404:
          $ref: '#/responses/CannotReturnResponse'
        415:
          $ref: '#/responses/UnsupportedMediaType'
        429:
          $ref: '#/responses/TooManyRequests'
        500:
          $ref: '#/responses/UnexpectedError'
  /cases/summaries:
    post:
      operationId: retrieveCaseSummaries
      tags:
      - Case
      summary: London Stock Exchange Group User activity monitoring. Initial request.
      description: "Return a collection of Cases that were modified by users in particular date range.\nEndpoint allow to initiate search and retrieve the first page of result set.\nThe query supports next field to specify searching criteria:\n\n'modificationDate' - Time when the case has been modified by the user;\n\n'assignedUserId' - Identifier of the User cases are assigned to;\n\n'groupId' - Identifier of the Group that owns the case;\n\n'creatorUserId' - Identifier of the case author;\n\n'modifierUserId' - Identifier of the recent changes author;\n\n'creationDate' - Time when the case has been created.\n\nTo retrieve the next set of results please use '/cases/summaries/cursor' endpoint.\n\n**Note:** Cursor lifespan keeps extending if the cursor is accessed within its current lifespan.\n          For example, once the cursor-id is generated using `POST /cases/summaries` endpoint, its lifespan is 60secs\n          from there. Within that 60secs, if `POST /cases/summaries/cursor` endpoint is called, it extends the\n          lifespan of the cursor to another 60secs from the point that call is made – and so on. If there are\n          no subsequent calls to `POST /cases/summaries/cursor` endpoint using the same cursor within 60secs, cursor\n          will expire.\n"
      parameters:
      - name: Authorization
        description: The authorization credentials including 'keyId', 'algorithm', 'headers', 'signature' (see 'Security and Authentication details' documentation section for more details)
        in: header
        type: string
        required: true
      - name: Date
        description: The date and time at which the message was originated in 'RFC 1123' format
        in: header
        type: string
        required: true
      - name: Content-Type
        description: The media type of the request (e.g., 'application/json')
        in: header
        type: string
        required: true
      - name: Content-Length
        description: The length of the request body in octets (8-bit bytes)
        in: header
        type: integer
        required: true
      - name: filter
        in: body
        description: The "query" is a FIQL expression which allows specifying comparison expression on case fields and it also allows specifying boolean operators AND/OR. The "sort" allows specifying items order in the response. The "cursorOptions" allows specifying count of items in the first response.
        required: true
        schema:
          $ref: '#/definitions/CaseSummaryFilter'
      responses:
        200:
          description: Case search response.
          schema:
            $ref: '#/definitions/CaseSearchResultResponse'
        400:
          $ref: '#/responses/BadRequest'
        401:
          $ref: '#/responses/Unauthorized'
        404:
          $ref: '#/responses/CannotReturnResponse'
        415:
          $ref: '#/responses/UnsupportedMediaType'
        429:
          $ref: '#/responses/TooManyRequests'
        500:
          $ref: '#/responses/UnexpectedError'
  /cases/summaries/cursor:
    post:
      operationId: scrollCaseSummaries
      tags:
      - Case
      summary: London Stock Exchange Group User activity monitoring. Subsequent request.
      description: "Continue loading result sets by cursor ID retrieved from POST/cases/summaries.\n\n**Note:** Cursor lifespan keeps extending if the cursor is accessed within its current lifespan.\n          For example, once the cursor-id is generated using `POST /cases/summaries` endpoint, its lifespan is 60secs\n          from there. Within that 60secs, if `POST /cases/summaries/cursor` endpoint is called, it extends the\n          lifespan of the cursor to another 60secs from the point that call is made – and so on. If there are\n          no subsequent calls to `POST /cases/summaries/cursor` endpoint using the same cursor within 60secs, cursor\n          will expire.\n"
      parameters:
      - name: Authorization
        description: The authorization credentials including 'keyId', 'algorithm', 'headers', 'signature' (see 'Security and Authentication details' documentation section for more details)
        in: header
        type: string
        required: true
      - name: Date
        description: The date and time at which the message was originated in 'RFC 1123' format
        in: header
        type: string
        required: true
      - name: Content-Type
        description: The media type of the request (e.g., 'application/json')
        in: header
        type: string
        required: true
      - name: Content-Length
        description: The length of the request body in octets (8-bit bytes)
        in: header
        type: integer
        required: true
      - name: cursor
        in: body
        description: Request to continue cases retrieval.
        required: true
        schema:
          $ref: '#/definitions/Cursor'
      responses:
        200:
          description: Case search response.
          schema:
            $ref: '#/definitions/CaseSearchResultResponse'
        400:
          $ref: '#/responses/BadRequest'
        401:
          $ref: '#/responses/Unauthorized'
        404:
          $ref: '#/responses/CannotReturnResponse'
        415:
          $ref: '#/responses/UnsupportedMediaType'
        429:
          $ref: '#/responses/TooManyRequests'
        500:
          $ref: '#/responses/UnexpectedError'
  /cases/saveAndScreen:
    post:
      operationId: saveAndScreenCases
      tags:
      - Case
      summary: London Stock Exchange Group Save and screen multiple cases.
      description: "Save and screen multiple cases for the given group Id. Caller may include multiple cases with up to 50 entities in a single request (see *Example HTTP request* below).\nIn response, the caller receives a summary of the creation operation for each case.\n\n*Example HTTP response* below, shows the following summary:\n\n  1. The first case has been created successfully.\n  2. The second case has not been created successfully because it does not meet the validation criteria;\n   \"errors\" and \"cause\" fields contain detailed information.\n\n**Example HTTP response**\n\n```\n  [\n      {\n          \"name\": \"Name 1\",\n          \"caseId\": \"Case ID 1\",\n          \"caseSystemId\": \"Case System ID 1\",\n          \"nameTransposition\": true,\n          \"caseScreeningState\": {\n              \"WATCHLIST\": \"INITIAL\"\n          }\n      },\n      {\n          \"name\": \"Name 2\",\n          \"caseId\": \"Case ID 2\",\n          \"errors\": [\n              {\n                  \"error\": \"CASE_ID_EXISTS\",\n                  \"cause\": \"Case IDs must be unique within the same client and request.\"\n              }\n          ]\n      }\n  ]\n```\n\n**Note:** The maximum number of World-Check screenings (including initial, rescreening, and ZFP ones)\n          that a client can perform in an hour is limited.\n"
      parameters:
      - name: Authorization
        description: The authorization credentials including 'keyId', 'algorithm', 'headers', 'signature' (see 'Security and Authentication details' documentation section for more details)
        in: header
        type: string
        required: true
      - name: Date
        description: The date and time at which the message was originated in 'RFC 1123' format
        in: header
        type: string
        required: true
      - name: Content-Type
        description: The media type of the request (e.g., 'application/json')
        in: header
        type: string
        required: true
      - name: Content-Length
        description: The length of the request body in octets (8-bit bytes)
        in: header
        type: integer
        required: true
      - name: caseDetailsCollection
        in: body
        description: Container of cases that is used in scope of creation operation.
        required: true
        schema:
          $ref: '#/definitions/CaseDetailsCollection'
      responses:
        200:
          description: 'If the request passed general validation, the caller receives response with CaseReference list,

            with summaries for each case located in payload.

            '
          schema:
            type: array
            items:
              $ref: '#/definitions/CaseReferenceDetails'
        400:
          $ref: '#/responses/BadRequest'
        401:
          $ref: '#/responses/Unauthorized'
        403:
          $ref: '#/responses/Forbidden'
        404:
          $ref: '#/responses/CannotReturnResponse'
        415:
          $ref: '#/responses/UnsupportedMediaType'
        429:
          $ref: '#/responses/TooManyRequests'
        500:
          $ref: '#/responses/UnexpectedError'
  /cases/screeningStatus:
    post:
      operationId: screeningStatus
      tags:
      - Case
      summary: London Stock Exchange Group Retrieve case screening status and aggregated result for multiple cases.
      description: "Retrieve case screening statuses and aggregated results. Caller may include multiple cases with up to 50 entities in a single request (see *Example HTTP request* below).\nIn response, the caller receives a status and aggregated screening results for each case.\n\n**Example HTTP response**\n\n```\n  Response example returned for request not containing \"providerTypes\" field.\n  [\n      {\n          \"caseSystemId\": \"Case System ID 1\",\n          \"screeningStatus\": \"SCREENED\",\n          \"requestFromScreenedDate\": \"2020-10-24T11:40:21.517Z\",\n          \"lastScreenedDate\": \"2019-12-16T14:44:15.582Z\",\n          \"providerSummaries\": {\n              \"WATCHLIST\": {\n                  \"totalMatches\": 38,\n                  \"reviewRequired\": 0,\n                  \"unresolved\": 35\n              }\n          }\n      },\n      {\n          \"caseSystemId\": \"Case System ID 2\",\n          \"screeningStatus\": \"NOT_SCREENED\",\n          \"requestFromScreenedDate\": \"2020-10-24T11:40:21.517Z\",\n          \"providerSummaries\": {\n              \"WATCHLIST\": {\n                  \"totalMatches\": 0,\n                  \"reviewRequired\": 0,\n                  \"unresolved\": 0\n              },\n              \"PASSPORT_CHECK\": {\n                  \"isReviewRequired\": false\n              }\n          }\n      },\n      {\n          \"caseSystemId\": \"Case System ID 3\",\n          \"screeningStatus\": \"SCREENED\",\n          \"requestFromScreenedDate\": \"2019-10-24T11:40:21.517Z\",\n          \"lastScreenedDate\": \"2019-12-20T08:25:32.146Z\",\n          \"providerSummaries\": {\n              \"WATCHLIST\": {\n                  \"totalMatches\": 625,\n                  \"reviewRequired\": 0,\n                  \"unresolved\": 618\n              }\n          }\n      }\n  ]\n\n  Response example returned for request containing \"providerTypes\" field.\n  [\n      {\n          \"caseSystemId\": \"Case System ID 1\",\n          \"requestFromScreenedDate\": \"2020-10-24T11:40:21.517Z\",\n          \"lastScreenedDate\": \"2019-12-16T14:44:15.582Z\",\n          \"providerSummaries\": {\n              \"WATCHLIST\": {\n                  \"status\": \"SCREENED\",\n                  \"totalMatches\": 38,\n                  \"reviewRequired\": 0,\n                  \"unresolved\": 35\n              }\n          }\n      },\n      {\n          \"caseSystemId\": \"Case System ID 2\",\n          \"requestFromScreenedDate\": \"2020-10-24T11:40:21.517Z\",\n          \"providerSummaries\": {\n              \"WATCHLIST\": {\n                  \"status\": \"SCREENED\",\n                  \"totalMatches\": 0,\n                  \"reviewRequired\": 0,\n                  \"unresolved\": 0\n              },\n              \"PASSPORT_CHECK\": {\n                  \"isReviewRequired\": false\n              }\n          }\n      },\n      {\n          \"caseSystemId\": \"Case System ID 3\",\n          \"requestFromScreenedDate\": \"2019-10-24T11:40:21.517Z\",\n          \"lastScreenedDate\": \"2019-12-20T08:25:32.146Z\",\n          \"providerSummaries\": {\n              \"WATCHLIST\": {\n                  \"status\": \"SCREENED\",\n                  \"totalMatches\": 625,\n                  \"reviewRequired\": 0,\n                  \"unresolved\": 618\n              },\n              \"MEDIA_CHECK\": {\n                  \"status\": \"SCREENED\",\n                  \"isReviewRequired\":\n              }\n          }\n      }\n  ]\n```\n"
      parameters:
      - name: Authorization
        description: The authorization credentials including 'keyId', 'algorithm', 'headers', 'signature' (see 'Security and Authentication details' documentation section for more details)
        in: header
        type: string
        required: true
      - name: Date
        description: The date and time at which the message was originated in 'RFC 1123' format
        in: header
        type: string
        required: true
      - name: Content-Type
        description: The media type of the request (e.g., 'application/json')
        in: header
        type: string
        required: true
      - name: Content-Length
        description: The length of the request body in octets (8-bit bytes)
        in: header
        type: integer
        required: true
      - name: caseScreeningStatus
        in: body
        description: Allows to specify cases and their screening dates that are using to define the screening status.
        required: true
        schema:
          $ref: '#/definitions/ScreeningStatusRequestCollection'
      responses:
        200:
          description: 'If the request passed general validation, the caller receives a response with screening status and aggregated results for each case in the payload.

            '
          schema:
            type: array
            items:
              $ref: '#/definitions/ScreeningStatusResponse'
        400:
          $ref: '#/responses/BadRequest'
        401:
          $ref: '#/responses/Unauthorized'
        404:
          $ref: '#/responses/CannotReturnResponse'
        415:
          $ref: '#/responses/UnsupportedMediaType'
        429:
          $ref: '#/responses/TooManyRequests'
        500:
          $ref: '#/responses/UnexpectedError'
definitions:
  CaseBulkLinkRequestCollection:
    type: object
    description: A request body on Bulk Update Case Links
    required:
    - link
    - relationshipType
    - caseSystemIds
    properties:
      link:
        type: boolean
        description: A flag indicating whether to Bulk Link (`true`) or Unlink (`false`) Cases.
      relationshipType:
        type: string
        description: Relationship type between cases.
        enum:
        - SUBCASE_TO_PRIMARY
        - PRIMARY_TO_SUBCASE
      caseSystemIds:
        type: array
        description: An array of case bulk link requests
        items:
          $ref: '#/definitions/CaseBulkLinkRequest'
      note:
        type: string
        maxLength: 1000
        description: Note added by the user.
    example:
      link: true
      relationshipType: SUBCASE_TO_PRIMARY
      caseSystemIds:
      - caseSystemId: caseSystemId1
      - relatedCaseSystemIds:
        - caseSystemId2
        - caseSystemId3
        - caseSystemId4
      - caseSystemId: caseSystemId5
      - relatedCaseSystemIds:
        - caseSystemId6
        - caseSystemId7
        - caseSystemId8
      note: Audit note
  ProviderSourceType:
    type: object
    properties:
      category:
        $ref: '#/definitions/ProviderSourceTypeCategoryDetail'
      identifier:
        type: string
      name:
        type: string
  AbstractAssociate:
    type: object
    description: 'The `AbstractAssociate` subclasses corresponding to each type of entity are:


      * `COUNTRY`: `CountryAssociate`

      * `INDIVIDUAL`: `IndividualAssociate`

      * `ORGANISATION`: `OrganisationAssociate`

      * `VESSEL`: `VesselAssociate`

      '
    discriminator: associateEntityType
    required:
    - associateEntityType
    - entityType
    properties:
      associateEntityType:
        type: string
        description: Discriminator field. Might go away in a future major version of the API
      entityType:
        type: string
        description: 'Profile Entity Type Enumeration.


          The `Entity` subclasses corresponding to each type of entity are:


          * `COUNTRY` : `CountryEntity`

          * `INDIVIDUAL` : `IndividualEntity`

          * `ORGANISATION` : `OrganisationEntity`

          * `VESSEL` : `VesselEntity`

          '
        enum:
        - COUNTRY
        - INDIVIDUAL
        - ORGANISATION
        - VESSEL
      reversed:
        type: boolean
        default: false
      targetEntityId:
        type: string
      targetExternalImportId:
        type: string
      type:
        type: string
        description: Associate Type Enumeration
        default: UNKNOWN
        enum:
        - ADVISOR
        - AGENT_REPRESENTATIVE
        - AFFILIATED_COMPANY
        - AFFILIATED_ORGANIZATION
        - AFFILIATED_POSITION
        - ASSET
        - ASSISTANT
        - ASSOCIATE
        - ASSOCIATED_SPECIAL_INTEREST_PERSON
        - AUNT
        - BANKER
        - BRANCH_OFFICE
        - BROTHER
        - BROTHER_IN_LAW
        - BUSINESS_ASSOCIATE
        - CHILD
        - CLIENT
        - COLLEAGUE
        - COUSIN
        - CO_DEFENDANT
        - DAUGHTER
        - DAUGHTER_IN_LAW
        - DIRECTOR
        - DOC_COMPANY
        - EMPLOYEE
        - EMPLOYER
        - EXECUTIVE
        - EX_HUSBAND
        - EX_WIFE
        - FAMILY
        - FAMILY_MEMBER
        - FATHER
        - FATHER_IN_LAW
        - FINANCIAL_ADVISOR
        - FRIEND
        - FRONT_COMPANY
        - GRANDDAUGHTER
        - GRANDFATHER
        - GRANDMOTHER
        - GRANDSON
        - GRAND_CHILD
        - GROUP_BENEFICIAL_OWNER
        - HUSBAND
        - KEY_MEMBER
        - LEGAL_ADVISOR
        - MISC
        - MOTHER
        - MOTHER_IN_LAW
        - NEPHEW
        - NIECE
        - NOMINEE
        - OPERATOR
        - OWNER
        - PARENT
        - POLITICAL_ADVISOR
        - REGISTERED_OWNER
        - RELATIVE
        - SAME_SEX_SPOUSE
        - SENIOR_OFFICIAL
        - SHAREHOLDER_OWNER
        - SHIP_MANAGER
        - SISTER
        - SISTER_IN_LAW
        - SON
        - SON_IN_LAW
        - SPOUSE
        - STEP_DAUGHTER
        - STEP_SON
        - STEPFATHER
        - STEPMOTHER
        - SUBSIDIARY
        - TECHNICAL_MANAGER
        - UNCLE
        - UNKNOWN
        - UNMARRIED_PARTNER
        - WIFE
      targetPrimaryName:
        type: string
      creationDate:
        type: string
        format: date-time
      modificationDate:
        type: string
        format: date-time
      updateCategory:
        type: string
        description: Entity Update Category Enumeration
        enum:
        - C1
        - C2
        - C3
        - C4
        - C6
        - UNKNOWN
      category:
        type: string
      targetCategories:
        type: array
        description: List of names of [ProviderSourceTypeCategoryDetail](#ProviderSourceTypeCategoryDetail) in sources of target Entity.
        uniqueItems: true
        items:
          type: string
  EntityType:
    type: string
    description: Entity type of the case.
    enum:
    - INDIVIDUAL
    - ORGANISATION
    - VESSEL
    - COUNTRY
  CursorOptions:
    type: object
    properties:
      itemsPerPage:
        type: integer
        description: Required parameter, with validation min value 1, max value 1000 which allows to define items per page in the response.
        format: int64
  CaseBulkStatus:
    type: object
    description: Case Bulk Status
    required:
    - caseSystemId
    - success
    properties:
      caseSystemId:
        type: string
        description: System generated ID for the Case
      success:
        type: boolean
        description: Indicates the result of Case Archiving / Unarchiving action
        example: true
      errors:
        type: array
        description: A set of validation errors
        items:
          $ref: '#/definitions/Error'
  ProviderTypeSummaryResult:
    type: object
    description: 'Contains enabled in the case provider types and their aggregated screening results.

      '
    properties:
      status:
        type: string
        description: Case Screening State Enumeration representing type of Screening.
        enum:
        - NOT_SCREENED
        - SCREENED
      totalMatches:
        type: integer
        format: int64
        example: 10
        description: Total mathes for provider type.
      reviewRequired:
        type: integer
        format: int64
        example: 10
        description: Review required for provider type.
      isReviewRequired:
        type: boolean
        example: true
        description: Identifies whether a review is required for the provider type.
      unresolved:
        type: integer
        format: int64
        example: 10
        description: Unresolved for provider type.
  TranslatedEntity:
    type: object
    description: Representation of translated entity.
    properties:
      translationDisclaimer:
        type: string
        description: Disclaimer for Translation Response.
      details:
        type: array
        description: A collection of translated entity details.
        items:
          $ref: '#/definitions/Detail'
  WatchlistResultSummary:
    type: object
    description: Match summary for results with provider type WATCHLIST
    properties:
      watchlistTotalMatches:
        type: integer
        format: int32
        description: Field contains watch list total matches count
      watchlistUnresolved:
        type: integer
        format: int32
        description: Field contains count of watch list unresolved
      watchlistReviewRequired:
        type: integer
        format: int32
        description: Field contains count of watch list review required
      categorisedMatches:
        type: object
        additionalProperties:
          type: object
          additionalProperties:
            type: integer
  PaginationResponse:
    type: object
    description: Outbound - used to describe paginated partial result sets
    allOf:
    - $ref: '#/definitions/Pagination'
    - properties:
        totalItems:
          type: integer
          format: int64
  AbstractScreeningResult:
    type: object
    description: Generic common Result fields returned after a Case is screened
    required:
    - referenceId
    properties:
      resultId:
        type: string
        maxLength: 255
        description: Result identifier
      referenceId:
        type: string
        description: The reference ID of the matched Entity
        maxLength: 255
      matchStrength:
        type: string
        description: Matched Result Strength
        enum:
        - WEAK
        - MEDIUM
        - STRONG
        - EXACT
      matchScore:
        type: number
        description: the exact match score with value rounded to 2 decimal places
        format: double
      matchedTerm:
        type: string
        description: Matched term for the Result. DEPRECATED in flavour of matchedTerms field
        maxLength: 1000
      matchedTerms:
        type: array
        description: List of matched terms for the result with resultId.
        items:
          $ref: '#/definitions/MatchedTerm'
      submittedTerm:
        type: string
        description: Submitted term for the Result
        maxLength: 1000
      matchedNameType:
        type: string
        description: Watchlist Profile Name Type enumeration. DEPRECATED in flavour of matchedTerms field
        enum:
        - PRIMARY
        - AKA
        - AKAENHANCED
        - FKA
        - DBA
        - MAIDEN
        - LANG_VARIATION
        - PREVIOUS
        - VEHICLE_ID
        - LOW_QUALITY_AKA
        - NATIVE_AKA
        - DOCUMENT_ID
      secondaryFieldResults:
        type: array
        description: Match results for Case secondary fields.
        items:
          $ref: '#/definitions/SecondaryFieldResult'
      sources:
        type: array
        description: 'Set of [ProviderSource](#ProviderSource)s, each of which contains this Result''s Entity and was used to screen

          the Case when this Result was last found.

          '
        items:
          type: string
          description: '[ProviderSource] (#ProviderSource) Identifier.

            '
      categories:
        type: array
        description: 'Set of [ProviderSourceTypeCategory] (#ProviderSourceTypeCategoryDetail) names of this Result''s sources.

          '
        items:
          type: string
          description: '[ProviderSourceTypeCategory] (#ProviderSourceTypeCategoryDetail) Name.

            '
      creationDate:
        type: string
        format: date-time
        description: Result creation date and time.
      modificationDate:
        type: string
        format: date-time
        description: Result modification date and time.
      lastAlertDate:
        type: string
        format: date-time
        description: Last alert date of the matched result term.
      modifier:
        description: The modifier of the matched result term.
        $ref: '#/definitions/UserSummary'
      resolution:
        $ref: '#/definitions/Resolution'
      resultReview:
        $ref: '#/definitions/Review'
  CaseDetails:
    type: object
    description: 'Representation of a single case that is used for case creation operation.

      Defines Case data that can be sent when creating a new Case.

      '
    required:
    - entityType
    - name
    properties:
      caseId:
        type: string
        description: Case ID provided by the client. This is auto-generated by the system if not provided.
        maxLength: 512
      entityType:
        type: string
        description: Case Entity Type Enumeration.
        enum:
        - INDIVIDUAL
        - ORGANISATION
        - VESSEL
        - UNSPECIFIED
      name:
        type: string
        description: Name to screen for this case.
