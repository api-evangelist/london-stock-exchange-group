          items:
            $ref: '#/definitions/CountryLink'
        identityDocuments:
          type: array
          description: List of identity documents from the Result
          items:
            $ref: '#/definitions/IdentityDocument'
        category:
          type: string
          description: 'The category of the Result, i.e. `POLITICAL - INDIVIDUAL`, `INDIVIDUAL`, `DIPLOMAT`, `TERRORISM`, `CRIME - NARCOTICS`,

            `CRIME - ORGANIZED`, `CRIME - OTHER`, `CRIME - NARCOTICS`, `CRIME - FINANCIAL` etc.

            '
          maxLength: 255
        providerType:
          type: string
          description: Provider Type Enumeration
          enum:
          - WATCHLIST
          - PASSPORT_CHECK
          - CLIENT_WATCHLIST
          - MEDIA_CHECK
        gender:
          type: string
          description: Gender Type Enumeration
          default: UNKNOWN
          enum:
          - MALE
          - FEMALE
          - UNKNOWN
        entityCreationDate:
          type: string
          format: date-time
          description: Entity creation date of the result.
        entityModificationDate:
          type: string
          format: date-time
          description: Entity modification date of the result.
        pepStatus:
          type: string
          description: The PEP Status of the result.
          enum:
          - ACTIVE
          - INACTIVE
          - UNKNOWN
          - NOT_AVAILABLE
        actionTypes:
          type: array
          description: Reasons for pending alerts.
          items:
            type: string
            enum:
            - DATA_ISSUE
            - RESULT_NOT_FOUND
            - SCORE_INCREASED
            - SCORE_DECREASED
            - PROFILE_UPDATED
            - PROFILE_UPDATED_C1
            - PROFILE_UPDATED_C2
            - PROFILE_UPDATED_C3
            - PROFILE_UPDATED_C4
            - AUTO_RESOLVED_FALSE_PREVIOUS_POSITIVE
            - GENDER_UPDATED
            - DATE_OF_BIRTH_UPDATED
            - COUNTRY_LOCATION_UPDATED
            - PLACE_OF_BIRTH_UPDATED
            - NATIONALITY_UPDATED
            - REGISTERED_COUNTRY_UPDATED
            - IMO_NUMBER_UPDATED
  ResultsReview:
    type: object
    description: Entity to set the review remark of supplied result IDs
    required:
